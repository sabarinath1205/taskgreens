<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="body">
   <img src="images.jpg" alt="Logo" class="logo"><br><br>
   
    
<div class="signup-div">
   
        
        <h2 class="signup-title">Sign Up</h2>

       
        <div class="details">

            <label for="fullname">Full Name</label><br>
            <input  class="form-control" type="text" id="fullname"><br><br>

            <label for="email">Email Address</label><br>
            <input  class="form-control" type="email" id="email"><br><br>

            <label for="password">Password</label><br>
            <input  class="form-control" type="password" id="password"><br><br>

            <label for="confirm-password">Confirm Password</label><br>
            <input  class="form-control" type="password" id="confirm-password">
        </div>

        

    
        <div class="signup-button">
            <button type="submit">Sign Up</button>
        
        </div>
            <div class="login-option">
            <p>Already have an account? Log in</p>
        </div>

        <div class="social-signup1">
            <button  CLASS="social-button" type="button">Sign up with Google</button><br><br>
            </div>
<div class="social-signup2">
            <button class="social-button" type="button">Sign up with Facebook</button>
</div>
       
        </div>
    </form>

</body>
</html>
